name: Retrain Titanic Model

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Workflow-CI/MLProject/titanic_preprocessed.csv'
  workflow_dispatch: 

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn mlflow

    - name: Run MLflow Retrain Project
      run: |
        # Menjalankan MLflow project dengan --no-conda untuk memanfaatkan environment global runner
        mlflow run Workflow-CI/MLProject --no-conda

    - name: Copy Model Artifacts
      run: |
        # Membuat folder artifacts di root repository jika belum ada
        mkdir -p artifacts
        # Menyalin model hasil training dari folder MLProject ke folder artifacts root
        cp -r Workflow-CI/MLProject/artifacts/model artifacts/

    - name: Commit and Push Updated Model
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add artifacts/
        # Commit hanya jika ada perubahan pada artefak model
        if git diff --cached --quiet; then
          echo "Tidak ada perubahan pada model. Skip commit."
        else
          git commit -m "Auto-retrain: Update model artifacts [skip ci]"
          git push
        fi
